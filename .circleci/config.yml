version: 2.1

# Defining default values for all jobs
defaults: &defaults
    docker:
        - image: salesforce/cli:2.135.7-full

jobs:
    setup_project:
        <<: *defaults
        steps:
            - checkout:
                  method: full
            - run:
                  name: Install Salesforce DX
                  command: |
                      openssl version
                      openssl enc -nosalt -aes-256-cbc -d -in assets/server.key.enc -out assets/server.key -base64 -K $ENCRYPTION_KEY -iv $ENCRYPTION_IV
                      export SF_USE_GENERIC_UNIX_KEYCHAIN=true
                      export SF_DOMAIN_RETRY=300
                      export SF_LOG_LEVEL=debug
                      export SF_IMPROVED_CODE_COVERAGE=true
                      node -v
                      npx sf --version
                      npx sf plugins --core
            - persist_to_workspace:
                  # This is an important step. If we don't store the project data (cloned GitHub source and node_modules from the CLI installation)
                  # we'd have to re-run installation for every workflow step.
                  #
                  # Also this step is crucial as we use it to share sfdx config parameters between steps.
                  root: ~/
                  paths:
                      - project/*
    setup_dx:
        # This command runs the preparation steps needed for the CI workflow:
        #
        # - Installation of the Salesforce CLI using npm
        # - Authentication of the DevHub
        # - Creation of a scratch org
        #
        # While a scratch org isn't needed in all steps it's still part of the process. The reason for this is
        # that we need to store the sfdx configuration files for it in the workspace, so that data can be shared
        # across different workflow steps.
        #
        # Keep it simple!
        <<: *defaults
        steps:
            - attach_workspace:
                  at: ~/
            - run:
                  name: Authenticate DevHub
                  command: |
                      npx sf auth jwt grant --clientid $CONSUMERKEY --jwtkeyfile assets/server.key --username $USERNAME --setdefaultdevhubusername -a HubOrg
            - run:
                  name: Define CI Org
                  command: |
                      npx sf org create scratch -v HubOrg -d -f config/$CONFIG_FILE.json -a ciorg -y 1 --wait 10
            - run:
                  name: Remove Server Key
                  when: always
                  command: |
                      rm assets/server.key
            - run:
                  name: Clean Up Scratch Org On Failure
                  when: on_fail
                  # If this job created ciorg but then failed before persist_to_workspace, the org's auth
                  # is never persisted, so the terminal cleanup_scratch_org job cannot see it and would
                  # leave it alive. Delete it here, in the same container where the auth still exists.
                  # Best-effort: the org may never have been created (e.g. Define CI Org failed), so a
                  # failed delete is tolerated — this runs only on an already-failing job.
                  command: |
                      npx sf org delete scratch -o ciorg -p || true
            - persist_to_workspace:
                  # This is an important step. If we don't store the project data (cloned GitHub source and node_modules from the CLI installation)
                  # we'd have to re-run installation for every workflow step.
                  #
                  # Also this step is crucial as we use it to share sfdx config parameters between steps.
                  root: ~/
                  paths:
                      - .sfdx/*
                      - project/*
    deploy_source:
        # This deploys the source to the ci scratch org.
        <<: *defaults
        steps:
            - attach_workspace:
                  at: ~/
            - run:
                  name: Push Source
                  no_output_timeout: 30m
                  command: |
                      npx sf project deploy start -o ciorg -w 25

    run_apex_tests:
        <<: *defaults
        steps:
            - attach_workspace:
                  at: ~/
            - run:
                  name: Retrieve User ID and Setup Debug Mode
                  command: |
                      # Retrieve User ID
                      USER_ID=$(npx sf force user display --target-org ciorg --json | jq -r '.result.id')

                      echo "User ID: $USER_ID"

                      # Create a DebugLevel
                      DEBUG_LEVEL_ID=$(npx sf data create record --target-org ciorg --use-tooling-api --sobject DebugLevel --values "DeveloperName='MyDebugLevel' MasterLabel='My Debug Level' ApexCode='DEBUG' ApexProfiling='INFO' Callout='INFO' Database='INFO' System='DEBUG' Validation='INFO' Visualforce='INFO' Workflow='INFO'" --json | jq -r '.result.id')

                      echo "Debug Level ID: $DEBUG_LEVEL_ID"

                      # Set ExpirationDate to 30 minutes from now
                      EXPIRATION_DATE=$(date -u -d '+30 minutes' +'%Y-%m-%dT%H:%M:%SZ')

                      # Create a TraceFlag
                      npx sf data create record --use-tooling-api --sobject TraceFlag --values "DebugLevelId='$DEBUG_LEVEL_ID' ExpirationDate='$EXPIRATION_DATE' LogType='USER_DEBUG' TracedEntityId='$USER_ID'" --target-org ciorg
            - run:
                  name: Run Apex Tests
                  command: |
                      npx sf apex run test -o ciorg --code-coverage -r human -d ~/apex_tests --wait 15
            - run:
                  name: Retrieve and Print Debug Log
                  command: |
                      # Get the list of debug logs
                      LOGS=$(npx sf apex list log --target-org ciorg --json)

                      # Extract the log IDs where Operation is "ApexTestHandler" and print the debug log for each ID
                      echo "$LOGS" | jq -r '.result[] | select(.Operation == "ApexTestHandler") | .Id' | while read LOG_ID; do
                          echo "Log ID: $LOG_ID"
                          npx sf apex get log --log-id $LOG_ID --target-org ciorg
                      done
                  when: on_fail
            - persist_to_workspace:
                  root: ~/
                  paths:
                      - apex_tests/*

    run_lwc_tests:
        <<: *defaults
        steps:
            - attach_workspace:
                  at: ~/
            - run:
                  name: Install Dependencies
                  command: npm install
            - run:
                  name: Run LWC Tests
                  command: |
                      npm run test:unit:coverage

    run_e2e_tests:
        <<: *defaults
        steps:
            - attach_workspace:
                  at: ~/
            - run:
                  name: Install Dependencies
                  command: npm install
            - run:
                  name: Install Playwright Browser
                  command: |
                      npx playwright install --with-deps chromium
            - run:
                  name: Assign Permission Sets
                  command: |
                      npx sf org assign permset --name rflib_Ops_Center_Access --name rflib_Create_Application_Event --target-org ciorg
            - run:
                  name: Run E2E Tests
                  no_output_timeout: 30m
                  command: |
                      export RFLIB_E2E_TARGET_ORG=ciorg
                      npx playwright test
            - store_artifacts:
                  path: playwright-report
                  destination: playwright-report
            - store_artifacts:
                  path: test-results
                  destination: test-results

    cleanup_scratch_org:
        # Single owner of scratch org deletion. In the workflow it depends on the Apex and
        # E2E jobs as "terminal", so it runs once both have reached a final state (pass, fail,
        # canceled, or not-run) and never while either is still using the org. This guarantees
        # the org is removed on every path.
        #
        # Tolerate ONLY the expected "ciorg was never created" case (e.g. setup_dx failed before
        # creating it) so that doesn't turn this job red. Any OTHER failure means the org may still
        # be alive, so retry once and then fail loudly rather than masking a real leak with `|| true`.
        <<: *defaults
        steps:
            - attach_workspace:
                  at: ~/
            - run:
                  name: Clean Up
                  command: |
                      set +e
                      # Probe for ciorg. If the probe itself fails (transient CLI/API/auth, or unparseable
                      # output) we must NOT treat that as "no org" — that would mask a possibly-live org.
                      ORG_LIST=$(npx sf org list --json)
                      if [ $? -ne 0 ]; then
                          echo "$ORG_LIST"
                          echo "sf org list failed; cannot verify ciorg state. Failing so a possible leak is visible."
                          exit 1
                      fi
                      ALIASES=$(echo "$ORG_LIST" | jq -r '.result.scratchOrgs[]?.alias // empty')
                      if [ $? -ne 0 ]; then
                          echo "Could not parse sf org list output; cannot verify ciorg state. Failing."
                          exit 1
                      fi
                      if ! echo "$ALIASES" | grep -Fxq ciorg; then
                          echo "No ciorg scratch org found; nothing to clean up."
                          exit 0
                      fi
                      for attempt in 1 2; do
                          npx sf org delete scratch -o ciorg -p
                          if [ $? -eq 0 ]; then
                              echo "Scratch org deleted."
                              exit 0
                          fi
                          echo "Delete attempt $attempt failed; retrying in 15s..."
                          sleep 15
                      done
                      echo "Scratch org deletion failed after retries; failing so the leak is visible."
                      exit 1

    report_coverage:
        <<: *defaults
        steps:
            - attach_workspace:
                  at: ~/
            - run:
                  name: Install Dependencies
                  command: npm install
            - run:
                  name: Report Coverage
                  command: |
                      cp ~/apex_tests/test-result-codecoverage.json .
                      bash <(curl -s https://codecov.io/bash)
                      rm -f test-result-codecoverage.json
                      node_modules/codecov/bin/codecov

    scan_flows:
        <<: *defaults
        steps:
            - attach_workspace:
                  at: ~/
            - run:
                  name: Install Dependencies
                  command: npm install
            - run:
                  name: Install Lightning Flow Scanner
                  command: |
                      echo y | npx sf plugins install lightning-flow-scanner
            - run:
                  name: Scan Flows
                  command: |
                      npx gulp scan-flow
# Wrapping every job in a single group lets us attach a serial-group to the whole
# pipeline. The group acquires the serial-group lock before its first job and holds
# it until the last job finishes, so a newer pipeline waits for the active one to
# fully complete (including the cleanup_scratch_org job) instead of running
# in parallel. This keeps only one CI scratch org alive at a time, which avoids
# exhausting the DevHub scratch org limits. serial-group queues runs; it does not
# cancel them.
job-groups:
    build_and_test_group:
        jobs:
            - setup_project
            - setup_dx:
                  requires:
                      - setup_project
            - deploy_source:
                  requires:
                      - setup_dx
            - run_lwc_tests:
                  requires:
                      - setup_project
            - scan_flows:
                  requires:
                      - setup_project
            - run_apex_tests:
                  requires:
                      - deploy_source
            - run_e2e_tests:
                  requires:
                      - deploy_source
            - cleanup_scratch_org:
                  requires:
                      - run_apex_tests: terminal
                      - run_e2e_tests: terminal
            - report_coverage:
                  requires:
                      - run_apex_tests
                      - run_lwc_tests
                  filters:
                      branches:
                          only: master

workflows:
    build_and_test:
        jobs:
            - build_and_test_group:
                  serial-group: << pipeline.project.slug >>/build-and-test
